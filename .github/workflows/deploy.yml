name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# NOTE: This project has moved to Baby Mo:
#   https://babymo.id/id/apps/kids-activity/
# To avoid two competing copies (and split SEO), GitHub Pages now publishes a
# static redirect (the ./redirect folder) instead of building the app. The app
# source is preserved in this repo for archival/history.
#
# To restore the standalone app deploy, revert this workflow to its previous
# form (npm ci -> npm run build -> publish ./dist with a 404.html fallback).
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: redirect

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
